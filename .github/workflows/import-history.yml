name: 1-手动导入历史数据到MongoDB

on:
  workflow_dispatch:

jobs:
  import-data:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout代码
       uses: actions/checkout@v4
    
     - name: 配置 Python 环境
       uses: actions/setup-python@v5
       with:
        python-version: 3.9.12

     - name: 安装数据库驱动
       run: pip install pymongo
       
     - name: 执行导入脚本
       env:
         MONGODB_URI: ${{ secrets.MONGODB_URI }}
       run: |
         python -c "
         import json, os
         from pymongo import MongoClient
         
         client = MongoClient(os.environ['MONGODB_URI'])
         db = client['bing']
         mkts = ['zh-CN', 'en-US', 'ja-JP', 'en-GB', 'de-DE', 'fr-FR', 'it-IT', 'en-CA', 'en-IN']
         
         for mkt in mkts:
             path = f'data/{mkt}_all.json'
             if os.path.exists(path):
                 print(f'正在处理 {mkt}...')
                 with open(path, 'r', encoding='utf-8') as f:
                     data = json.load(f)
                     items = data.get('data', [])
                     if items:
                         transformed_items = []
                         for item in items:
                             # 核心修复：把生成的 JSON 格式，反向还原为数据库期望的必应原始格式
                             enddate = item.get('datetime', '').replace('-', '')
                             url = item.get('url', '').replace('https://bing.com', '').replace('https://www.bing.com', '')
                             urlbase = url.split('_1920x1080')[0].split('_UHD')[0] if url else ''
                             
                             transformed_item = {
                                 'startdate': enddate,
                                 'enddate': enddate,
                                 'url': url,
                                 'urlbase': urlbase,
                                 'copyright': item.get('copyright', ''),
                                 'copyrightlink': item.get('copyrightlink', ''),
                                 'title': item.get('title', ''),
                                 'hsh': item.get('hsh', '')
                             }
                             transformed_items.append(transformed_item)
                             
                         db[mkt].delete_many({}) # 清空旧的错误数据
                         db[mkt].insert_many(transformed_items) # 插入格式正确的数据
                         print(f'✅ 成功将 {len(transformed_items)} 条转换后的数据导入到 {mkt} 集合！')
                     else:
                         print(f'⚠️ {mkt} 数据为空。')
         "
