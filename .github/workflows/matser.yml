name: update-bing-walpaper

on:
#  push:
#    branches:
#     - master
  schedule:
    - cron: '30 * * * *'
  repository_dispatch:
    types:
      - webhook
  workflow_dispatch:

env:
  STORAGE_TYPE: mongodb
  # mongodb配置
  MONGODB_URI: ${{ secrets.MONGODB_URI }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          fetch-depth: 0 # 必须保留，防止 shallow update 报错
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          cache: 'pip'
          python-version: 3.9.12

      - name: Install Requirements
        working-directory: ./bing_wallpaper_api
        run: |
          pip install --upgrade pip 'pip<24.1'
          pip install -r requirements.txt
          pip install tencentcloud-sdk-python
          pip install tencentcloud-sdk-python-cdn   

      - name: mongodb Update bing
        if: ${{ env.STORAGE_TYPE == 'mongodb' }}  
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        working-directory: ./
        run: |
          python bing_wallpaper_api/run.py
          python bing_wallpaper_api/run_fix_last_day.py
          
      - name: Commit json Files
        run: |
          sh commit.sh

      - name: Push changes to GitHub
        uses:  ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master

      # =========================================
      # 以下是替换为同步到阿里云 Codeup 的步骤
      # =========================================
      - name: Sync to Aliyun Codeup
        env:
          CODEUP_USER: ${{ secrets.CODEUP_USER }}
          CODEUP_TOKEN: ${{ secrets.CODEUP_TOKEN }}
          CODEUP_REPO_PATH: ${{ secrets.CODEUP_REPO_PATH }}
        run: |
          # 屏蔽 git 输出中的凭证信息
          git config --global credential.helper store
          
          # 添加 Codeup 作为远程仓库 (拼接认证信息)
          git remote add codeup https://${CODEUP_USER}:${CODEUP_TOKEN}@codeup.aliyun.com/${CODEUP_REPO_PATH}
          
          # 将刚才 commit 的内容强推到 Codeup 的 master 分支
          git push codeup HEAD:master -f

#      - name: Refresh CDN #没有使用腾讯云cdn可删除该步骤
#        run: |
#          python cdn.py ${{ secrets.TENCENT_SECRETID }} ${{ secrets.TENCENT_SECRETKEY }} ${{ secrets.CDN_URL }}
